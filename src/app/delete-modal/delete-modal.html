<div class="delete-modal__backdrop" (click)="cancel()"></div>

<div class="delete-modal__container" role="presentation">
  <section
    class="delete-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="delete-modal-title"
    aria-describedby="delete-modal-description"
    (click)="$event.stopPropagation()"
  >
    <h2 id="delete-modal-title" class="delete-modal__title">Delete comment</h2>
    <p id="delete-modal-description" class="delete-modal__description">
      Are you sure you want to delete this comment? This will remove the comment and can't be undone.
    </p>

    <div class="delete-modal__actions">
      <button class="delete-modal__button delete-modal__button--cancel" type="button" (click)="cancel()">
        NO, CANCEL
      </button>
      <button
        class="delete-modal__button delete-modal__button--confirm"
        type="button"
        autofocus
        (click)="confirm()"
      >
        YES, DELETE
      </button>
    </div>
  </section>
</div>
