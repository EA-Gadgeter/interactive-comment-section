<main class="comments-page" aria-label="Interactive comments section">
  <app-comment-thread
    [comments]="comments()"
    [currentUser]="currentUser()"
    [currentUsername]="currentUsername()"
    (commentCreated)="createComment($event)"
    (replyCreated)="createReply($event)"
    (upvoteRequested)="upvote($event)"
    (downvoteRequested)="downvote($event)"
    (deleteRequested)="openDeleteModal($event)"
    (updateRequested)="updateContent($event)"
  ></app-comment-thread>

  @if (pendingDeleteTarget()) {
    <app-delete-modal
      animate.enter="modal-fade-enter"
      animate.leave="modal-fade-leave"
      (confirmed)="confirmDelete()"
      (cancelled)="closeDeleteModal()"
    ></app-delete-modal>
  }
</main>
